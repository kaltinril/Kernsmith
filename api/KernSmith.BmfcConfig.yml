  fullName.vb: KernSmith.BmfcConfig.FromOptions(KernSmith.FontGeneratorOptions, String, String, String, KernSmith.OutputFormat)
  name.vb: FromOptions(FontGeneratorOptions, String, String, String, OutputFormat)
