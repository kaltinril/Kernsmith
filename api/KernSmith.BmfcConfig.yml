    id: FromOptions
    path: src/KernSmith/Config/BmfcConfig.cs
    startLine: 35
  assemblies:
  - KernSmith
  namespace: KernSmith
  summary: >-
    Creates a <xref href="KernSmith.BmfcConfig" data-throw-if-not-resolved="false"></xref> from existing <xref href="KernSmith.FontGeneratorOptions" data-throw-if-not-resolved="false"></xref>

    with optional font source and output path. Useful for standalone .bmfc export

    via <xref href="KernSmith.BmfcConfigWriter.Write(KernSmith.BmfcConfig)" data-throw-if-not-resolved="false"></xref> without parsing an existing file.
  example: []
  syntax:
    content: public static BmfcConfig FromOptions(FontGeneratorOptions options, string? fontFile = null, string? fontName = null, string? outputPath = null, OutputFormat outputFormat = OutputFormat.Text)
    parameters:
    - id: options
      type: KernSmith.FontGeneratorOptions
      description: Font generation options to wrap.
    - id: fontFile
      type: System.String
      description: Path to the font file, or null.
    - id: fontName
      type: System.String
      description: System font family name, or null.
    - id: outputPath
      type: System.String
      description: Output path, or null.
    - id: outputFormat
      type: KernSmith.OutputFormat
      description: Output format (default <xref href="KernSmith.OutputFormat.Text" data-throw-if-not-resolved="false"></xref>).
    return:
      type: KernSmith.BmfcConfig
      description: A new <xref href="KernSmith.BmfcConfig" data-throw-if-not-resolved="false"></xref> wrapping the given options.
    content.vb: Public Shared Function FromOptions(options As FontGeneratorOptions, fontFile As String = Nothing, fontName As String = Nothing, outputPath As String = Nothing, outputFormat As OutputFormat = OutputFormat.Text) As BmfcConfig
  overload: KernSmith.BmfcConfig.FromOptions*
