    - id: UnitsPerEm
      type: System.Int32
      description: Design units per em square (typically 1000 or 2048).
    - id: XMin
      type: System.Int32
      description: Left edge of the bounding box that fits all glyphs.
    - id: YMin
      type: System.Int32
      description: Bottom edge of the bounding box that fits all glyphs.
    - id: XMax
      type: System.Int32
      description: Right edge of the bounding box that fits all glyphs.
    - id: YMax
      type: System.Int32
      description: Top edge of the bounding box that fits all glyphs.
    - id: IndexToLocFormat
      type: System.Int32
      description: 'How glyph offsets are stored: 0 = short (16-bit), 1 = long (32-bit).'
    - id: Created
      type: System.Int64
      description: When the font was created (as a raw timestamp).
    - id: Modified
      type: System.Int64
      description: When the font was last modified (as a raw timestamp).
    - id: MacStyle
      type: System.UInt16
      description: 'Mac style flags: bit 0 = bold, bit 1 = italic, etc.'
    - id: LowestRecPPEM
      type: System.UInt16
      description: Smallest readable size in pixels per em.
