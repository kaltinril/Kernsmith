    id: PixelData
    path: src/KernSmith/Atlas/AtlasPage.cs
    startLine: 26
  assemblies:
  - KernSmith
  namespace: KernSmith.Atlas
  summary: >-
    Raw pixel data in row-major order, top-to-bottom.
        Format depends on <xref href="KernSmith.Atlas.AtlasPage.Format" data-throw-if-not-resolved="false"></xref>:

        <ul><li><xref href="KernSmith.PixelFormat.Rgba32" data-throw-if-not-resolved="false"></xref>: 4 bytes per pixel (R, G, B, A), width * height * 4 bytes total.</li><li><xref href="KernSmith.PixelFormat.Grayscale8" data-throw-if-not-resolved="false"></xref>: 1 byte per pixel (alpha/luminance), width * height bytes total.</li></ul>

        Suitable for direct upload to GPU textures (e.g., MonoGame Texture2D.SetData).
  example: []
  syntax:
    content: public required byte[] PixelData { get; init; }
    parameters: []
    return:
      type: System.Byte[]
    content.vb: Public Property PixelData As Byte()
