  assemblies:
  - KernSmith
  namespace: KernSmith.Font.Tables
  summary: "Data from the font's 'OS/2' table: weight, width, and platform-specific metrics."
  example: []
  syntax:
    content: public Os2Metrics(int WeightClass, int WidthClass, int TypoAscender, int TypoDescender, int TypoLineGap, int WinAscent, int WinDescent, int XHeight, int CapHeight, byte[] Panose, int FirstCharIndex, int LastCharIndex, short XAvgCharWidth = 0, short SubscriptXSize = 0, short SubscriptYSize = 0, short SuperscriptXSize = 0, short SuperscriptYSize = 0, short StrikeoutSize = 0, short StrikeoutPosition = 0)
    parameters:
    - id: WeightClass
      type: System.Int32
      description: Visual weight class. 400 = regular, 700 = bold.
    - id: WidthClass
      type: System.Int32
      description: Visual width class. 5 = normal width.
    - id: TypoAscender
      type: System.Int32
      description: Typographic ascent above the baseline, in font units.
    - id: TypoDescender
      type: System.Int32
      description: Typographic descent below the baseline, in font units (usually negative).
    - id: TypoLineGap
      type: System.Int32
      description: Typographic line gap, in font units.
    - id: WinAscent
      type: System.Int32
      description: Windows clipping ascent boundary, in font units.
    - id: WinDescent
      type: System.Int32
      description: Windows clipping descent boundary, in font units.
    - id: XHeight
      type: System.Int32
      description: Height of lowercase 'x', in font units.
    - id: CapHeight
      type: System.Int32
      description: Height of uppercase letters, in font units.
    - id: Panose
      type: System.Byte[]
      description: 10-byte array classifying the font's visual style (serif, weight, etc.).
    - id: FirstCharIndex
      type: System.Int32
      description: Lowest Unicode character in the font.
    - id: LastCharIndex
      type: System.Int32
      description: Highest Unicode character in the font.
    - id: XAvgCharWidth
      type: System.Int16
      description: Weighted average width of lowercase Latin letters and space, in font units.
    - id: SubscriptXSize
      type: System.Int16
      description: Horizontal size for subscripts, in font units.
    - id: SubscriptYSize
      type: System.Int16
      description: Vertical size for subscripts, in font units.
    - id: SuperscriptXSize
      type: System.Int16
      description: Horizontal size for superscripts, in font units.
    - id: SuperscriptYSize
      type: System.Int16
      description: Vertical size for superscripts, in font units.
    - id: StrikeoutSize
      type: System.Int16
      description: Width of the strikeout stroke, in font units.
    - id: StrikeoutPosition
      type: System.Int16
      description: Position of the strikeout stroke relative to the baseline, in font units.
    content.vb: Public Sub New(WeightClass As Integer, WidthClass As Integer, TypoAscender As Integer, TypoDescender As Integer, TypoLineGap As Integer, WinAscent As Integer, WinDescent As Integer, XHeight As Integer, CapHeight As Integer, Panose As Byte(), FirstCharIndex As Integer, LastCharIndex As Integer, XAvgCharWidth As Short = 0, SubscriptXSize As Short = 0, SubscriptYSize As Short = 0, SuperscriptXSize As Short = 0, SuperscriptYSize As Short = 0, StrikeoutSize As Short = 0, StrikeoutPosition As Short = 0)
