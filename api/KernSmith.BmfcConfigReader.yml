  summary: >-
    Parses .bmfc content from a string and returns a <xref href="KernSmith.BmfcConfig" data-throw-if-not-resolved="false"></xref>.

    Relative paths are not resolved since there is no file context.
  example: []
  syntax:
    content: public static BmfcConfig Parse(string content)
    parameters:
    - id: content
      type: System.String
      description: The .bmfc file content.
    return:
      type: KernSmith.BmfcConfig
      description: A <xref href="KernSmith.BmfcConfig" data-throw-if-not-resolved="false"></xref> containing parsed options and font source info.
