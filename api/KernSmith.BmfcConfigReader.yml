  namespace: KernSmith
  summary: >-
    Reads a .bmfc file from disk and returns a <xref href="KernSmith.BmfcConfig" data-throw-if-not-resolved="false"></xref>.

    Relative paths in the config (fontFile, outputPath) are resolved against the config file's directory.
  example: []
  syntax:
    content: public static BmfcConfig Read(string filePath)
    parameters:
    - id: filePath
      type: System.String
      description: Path to the .bmfc file.
    return:
      type: KernSmith.BmfcConfig
      description: A <xref href="KernSmith.BmfcConfig" data-throw-if-not-resolved="false"></xref> containing parsed options and font source info.
    content.vb: Public Shared Function Read(filePath As String) As BmfcConfig
  overload: KernSmith.BmfcConfigReader.Read*
  exceptions:
  - type: System.IO.FileNotFoundException
    commentId: T:System.IO.FileNotFoundException
    description: Thrown when <code class="paramref">filePath</code> does not exist.
