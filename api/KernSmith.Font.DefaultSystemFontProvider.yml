  example: []
  syntax:
    content: public byte[]? LoadFont(string familyName, string? styleName = null)
    parameters:
    - id: familyName
      type: System.String
      description: The font family name to search for (case-insensitive).
    - id: styleName
      type: System.String
      description: Optional style name to match (e.g., "Bold"). If null, prefers "Regular".
