    id: PipelineMetrics
    path: src/KernSmith/Config/PipelineMetrics.cs
    startLine: 25
  assemblies:
  - KernSmith
  namespace: KernSmith
  summary: >-
    Timing breakdown for each stage of the font generation pipeline.

    Enable with <xref href="KernSmith.FontGeneratorOptions.CollectMetrics" data-throw-if-not-resolved="false"></xref> or

    <code>BmFontBuilder.WithCollectMetrics()</code>, then read <code>BmFontResult.Metrics</code>.


    <p>Stages are recorded in pipeline order:</p>

    <ol><li><xref href="KernSmith.PipelineMetrics.FontParsing" data-throw-if-not-resolved="false"></xref> — Reading and parsing the TTF/OTF/WOFF font file (tables, metrics, kerning).</li><li><xref href="KernSmith.PipelineMetrics.CharsetResolution" data-throw-if-not-resolved="false"></xref> — Resolving requested characters against the font's available codepoints.</li><li><xref href="KernSmith.PipelineMetrics.Rasterization" data-throw-if-not-resolved="false"></xref> — Rendering each glyph to a bitmap via FreeType (or custom rasterizer).</li><li><xref href="KernSmith.PipelineMetrics.EffectsCompositing" data-throw-if-not-resolved="false"></xref> — Applying layered effects: outline, gradient, and shadow.</li><li><xref href="KernSmith.PipelineMetrics.PostProcessing" data-throw-if-not-resolved="false"></xref> — Running user-supplied <xref href="KernSmith.Rasterizer.IGlyphPostProcessor" data-throw-if-not-resolved="false"></xref> instances.</li><li><xref href="KernSmith.PipelineMetrics.SuperSampleDownscale" data-throw-if-not-resolved="false"></xref> — Downscaling glyphs rendered at Nx resolution back to target size.</li><li><xref href="KernSmith.PipelineMetrics.CellEqualization" data-throw-if-not-resolved="false"></xref> — Padding glyph cells to equal height when <xref href="KernSmith.FontGeneratorOptions.EqualizeCellHeights" data-throw-if-not-resolved="false"></xref> is enabled.</li><li><xref href="KernSmith.PipelineMetrics.AtlasSizeEstimation" data-throw-if-not-resolved="false"></xref> — Estimating optimal atlas texture dimensions before packing.</li><li><xref href="KernSmith.PipelineMetrics.AtlasPacking" data-throw-if-not-resolved="false"></xref> — Running the packing algorithm (MaxRects or Skyline) to place glyphs on atlas pages.</li><li><xref href="KernSmith.PipelineMetrics.AtlasEncoding" data-throw-if-not-resolved="false"></xref> — Encoding atlas pages to the target format (PNG, TGA, or DDS).</li><li><xref href="KernSmith.PipelineMetrics.ModelAssembly" data-throw-if-not-resolved="false"></xref> — Building the final <xref href="KernSmith.Output.Model.BmFontModel" data-throw-if-not-resolved="false"></xref> with character, kerning, and metadata blocks.</li></ol>

    <p>Stages that are not applicable (e.g., no effects configured) will report <xref href="System.TimeSpan.Zero" data-throw-if-not-resolved="false"></xref>

    and are omitted from <xref href="KernSmith.PipelineMetrics.ToString" data-throw-if-not-resolved="false"></xref> output.</p>
