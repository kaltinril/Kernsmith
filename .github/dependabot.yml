version: 2
updates:
  # NuGet package dependencies across the solution.
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    target-branch: main
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - nuget
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions used by the CI/CD workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    target-branch: main
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
