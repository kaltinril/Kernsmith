name: Benchmarks

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          # Install both SDKs: the benchmark project (and its referenced
          # libraries) multi-target net8.0;net10.0. -f net10.0 pins the host.
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Run benchmarks
        run: >
          dotnet run --project benchmarks/KernSmith.Benchmarks
          -c Release -f net10.0 -- --filter
          "*FontGenerationBenchmarks*"
          "*EndToEndBenchmarks*"
          --exporters json
          --job short
      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: BenchmarkDotNet.Artifacts/results/
          retention-days: 90
